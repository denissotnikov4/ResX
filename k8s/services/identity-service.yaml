---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: resx
  labels:
    app: identity-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: resx/identity-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ConnectionStrings__IdentityDb
              value: "Host=$(POSTGRES_HOST);Port=$(POSTGRES_PORT);Database=resx_identity;Username=$(POSTGRES_USER);Password=$(POSTGRES_PASSWORD)"
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: postgres-password
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: jwt-secret-key
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: JWT_AUDIENCE
            - name: EventBus__HostName
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: RABBITMQ_HOST
            - name: EventBus__VirtualHost
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: RABBITMQ_VHOST
            - name: EventBus__UserName
              valueFrom:
                configMapKeyRef:
                  name: resx-config
                  key: RABBITMQ_USER
            - name: EventBus__Password
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: rabbitmq-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: resx
spec:
  selector:
    app: identity-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service-hpa
  namespace: resx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
