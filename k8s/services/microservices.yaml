# ============================================================
# ResX Platform — All microservice Deployments + Services + HPAs
# (except identity-service which has its own file)
# ============================================================

# ─── USERS SERVICE ──────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: resx
  labels:
    app: users-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: resx/users-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__UsersDb
              value: "Host=postgres;Port=5432;Database=resx_users;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: postgres-password
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: jwt-secret-key
            - name: Jwt__Issuer
              value: ResX.Identity
            - name: Jwt__Audience
              value: ResX
            - name: EventBus__HostName
              value: rabbitmq
            - name: EventBus__VirtualHost
              value: resx
            - name: EventBus__UserName
              value: guest
            - name: EventBus__Password
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: rabbitmq-password
            - name: ConnectionStrings__Redis
              value: "redis:6379,password=$(REDIS_PASSWORD)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: resx-secrets
                  key: redis-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: resx
spec:
  selector:
    app: users-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: users-service-hpa
  namespace: resx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: users-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

