# ============================================================
# ResX — docker-compose.yml — Timeweb Cloud App Platform deploy
# ============================================================
# Only stateless application services. All stateful infrastructure
# (Postgres, RabbitMQ, Redis, S3) must be provisioned externally
# (Timeweb DBaaS / Object Storage / VPS) and connected via env vars.
#
# Local development uses docker-compose.local.yml (full stack with
# infra containers and volumes).
# ============================================================

services:

  # ───────────────────────────────────────────────────────────
  # Gateway FIRST — Timeweb proxies the main domain to this service.
  # All other services with `ports:` get <domain>:<host-port>.
  # ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./src
      dockerfile: Gateway/ResX.ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      ReverseProxy__Clusters__identity-cluster__Destinations__primary__Address: "http://identity-service:8080"
      ReverseProxy__Clusters__users-cluster__Destinations__primary__Address: "http://users-service:8080"
      ReverseProxy__Clusters__listings-cluster__Destinations__primary__Address: "http://listings-service:8080"
      ReverseProxy__Clusters__transactions-cluster__Destinations__primary__Address: "http://transactions-service:8080"
      ReverseProxy__Clusters__messaging-cluster__Destinations__primary__Address: "http://messaging-service:8080"
      ReverseProxy__Clusters__notifications-cluster__Destinations__primary__Address: "http://notifications-service:8080"
      ReverseProxy__Clusters__charity-cluster__Destinations__primary__Address: "http://charity-service:8080"
      ReverseProxy__Clusters__disputes-cluster__Destinations__primary__Address: "http://disputes-service:8080"
      ReverseProxy__Clusters__analytics-cluster__Destinations__primary__Address: "http://analytics-service:8080"
      ReverseProxy__Clusters__files-cluster__Destinations__primary__Address: "http://files-service:8080"
      Cors__Origins__0: "${FRONTEND_ORIGIN}"
    depends_on:
      - identity-service
      - users-service
      - listings-service
      - transactions-service
      - messaging-service
      - notifications-service
      - charity-service
      - disputes-service
      - files-service
      - analytics-service
    ports:
      - "8080:8080"

  # ───────────────────────────────────────────────────────────
  # Microservices (no ports → only internal to compose network)
  # ───────────────────────────────────────────────────────────
  identity-service:
    build:
      context: ./src
      dockerfile: Services/Identity/ResX.Identity.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__IdentityDb: "${IDENTITY_DB_CONNECTION}"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      Jwt__AccessTokenExpiryMinutes: "${JWT_ACCESS_EXPIRY_MIN:-60}"
      Jwt__RefreshTokenExpiryDays: "${JWT_REFRESH_EXPIRY_DAYS:-30}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"

  users-service:
    build:
      context: ./src
      dockerfile: Services/Users/ResX.Users.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__UsersDb: "${USERS_DB_CONNECTION}"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"

  listings-service:
    build:
      context: ./src
      dockerfile: Services/Listings/ResX.Listings.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ListingsDb: "${LISTINGS_DB_CONNECTION}"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"
      Services__Users__GrpcUrl: "http://users-service:8081"

  transactions-service:
    build:
      context: ./src
      dockerfile: Services/Transactions/ResX.Transactions.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__TransactionsDb: "${TRANSACTIONS_DB_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"
      Services__Listings__GrpcUrl: "http://listings-service:8081"

  messaging-service:
    build:
      context: ./src
      dockerfile: Services/Messaging/ResX.Messaging.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MessagingDb: "${MESSAGING_DB_CONNECTION}"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"
      Services__Users__GrpcUrl: "http://users-service:8081"
      Services__Listings__GrpcUrl: "http://listings-service:8081"

  notifications-service:
    build:
      context: ./src
      dockerfile: Services/Notifications/ResX.Notifications.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__NotificationsDb: "${NOTIFICATIONS_DB_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"

  charity-service:
    build:
      context: ./src
      dockerfile: Services/Charity/ResX.Charity.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CharityDb: "${CHARITY_DB_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"

  disputes-service:
    build:
      context: ./src
      dockerfile: Services/Disputes/ResX.Disputes.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DisputesDb: "${DISPUTES_DB_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      EventBus__HostName: "${RABBIT_HOST}"
      EventBus__Port: "${RABBIT_PORT:-5672}"
      EventBus__VirtualHost: "${RABBIT_VHOST:-resx}"
      EventBus__UserName: "${RABBIT_USER}"
      EventBus__Password: "${RABBIT_PASSWORD}"

  files-service:
    build:
      context: ./src
      dockerfile: Services/Files/ResX.Files.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__FilesDb: "${FILES_DB_CONNECTION}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER:-ResX.Identity}"
      Jwt__Audience: "${JWT_AUDIENCE:-ResX}"
      # Timeweb Object Storage:  https://s3.twcstorage.ru  /  region=ru-1
      S3__ServiceUrl: "${S3_SERVICE_URL}"
      S3__PublicUrl: "${S3_PUBLIC_URL}"
      S3__AccessKey: "${S3_ACCESS_KEY}"
      S3__SecretKey: "${S3_SECRET_KEY}"
      S3__BucketName: "${S3_BUCKET_NAME}"
      S3__Region: "${S3_REGION:-ru-1}"

  analytics-service:
    build:
      context: ./src
      dockerfile: Services/Analytics/ResX.Analytics.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__UsersDb: "${USERS_DB_CONNECTION}"
      ConnectionStrings__ListingsDb: "${LISTINGS_DB_CONNECTION}"
      ConnectionStrings__TransactionsDb: "${TRANSACTIONS_DB_CONNECTION}"
