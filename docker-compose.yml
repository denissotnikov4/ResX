version: "3.9"

# ============================================================
# ResX — P2P Resource Crossing Platform
# docker-compose.yml — production-like local orchestration
# ============================================================

networks:
  resx-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:

# ─────────────────────────────────────────
# INFRASTRUCTURE
# ─────────────────────────────────────────
services:

  postgres:
    image: postgres:17-alpine
    container_name: resx-postgres
    networks: [resx-network]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: resx-rabbitmq
    networks: [resx-network]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: resx
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: resx-redis
    networks: [resx-network]
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: resx-minio
    networks: [resx-network]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

# ─────────────────────────────────────────
# MICROSERVICES
# ─────────────────────────────────────────

  identity-service:
    build:
      context: ./src
      dockerfile: Services/Identity/ResX.Identity.API/Dockerfile
    container_name: resx-identity
    networks: [resx-network]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=resx_identity;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379,password=redis_password"
      Jwt__SecretKey: "change-this-super-secret-key-in-production-must-be-at-least-32-chars"
      Jwt__Issuer: "ResX.Identity"
      Jwt__Audience: "ResX"
      Jwt__AccessTokenExpiryMinutes: "60"
      Jwt__RefreshTokenExpiryDays: "30"
      EventBus__HostName: rabbitmq
      EventBus__VirtualHost: resx
      EventBus__UserName: guest
      EventBus__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

